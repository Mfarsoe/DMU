<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Puzzle - Øvelse 4</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
        }
        .container {
            display: flex;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .puzzle-board {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 2px;
            background-color: #ccc;
            border: 5px solid #333;
        }
        .tile {
            width: 100px;
            height: 100px;
            cursor: pointer;
            background-size: cover;
        }
        .empty {
            background-color: #eee;
            cursor: default;
        }
        .reference-image {
            text-align: center;
        }
        .reference-image img {
            width: 400px;
            border: 5px solid #333;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Sliding Puzzle</h1>
    <div class="container">
        <div id="board" class="puzzle-board"></div>
        <div class="reference-image">
            <h3>Reference</h3>
            <img src="img/hall.jpg" alt="Reference">
        </div>
    </div>
    <button onclick="shuffleGame()">Bland billeder</button>

    <script src="script.js"></script>
</body>
</html>
