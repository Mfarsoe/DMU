<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUS Spørgeskema - Biografhjemmeside</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>SUS Spørgeskema</h1>
            <p>System Usability Scale for Biografhjemmeside</p>
        </header>

        <form id="susForm">
            <div class="scale-info">
                <p><strong>Skala:</strong> 1 = Helt uenig, 5 = Helt enig</p>
            </div>

            <!-- Spørgsmål 1 -->
            <div class="question-container">
                <label>1. Jeg synes, at biografhjemmesiden er nem at bruge.</label>
                <div class="options">
                    <span>1</span>
                    <input type="radio" name="q1" value="1" required>
                    <input type="radio" name="q1" value="2">
                    <input type="radio" name="q1" value="3">
                    <input type="radio" name="q1" value="4">
                    <input type="radio" name="q1" value="5">
                    <span>5</span>
                </div>
            </div>

            <!-- Spørgsmål 2 -->
            <div class="question-container">
                <label>2. Det er nemt at finde information om film, spilletider og priser.</label>
                <div class="options">
                    <span>1</span>
                    <input type="radio" name="q2" value="1" required>
                    <input type="radio" name="q2" value="2">
                    <input type="radio" name="q2" value="3">
                    <input type="radio" name="q2" value="4">
                    <input type="radio" name="q2" value="5">
                    <span>5</span>
                </div>
            </div>

            <!-- Spørgsmål 3 -->
            <div class="question-container">
                <label>3. Jeg føler mig tryg ved at købe billetter via hjemmesiden.</label>
                <div class="options">
                    <span>1</span>
                    <input type="radio" name="q3" value="1" required>
                    <input type="radio" name="q3" value="2">
                    <input type="radio" name="q3" value="3">
                    <input type="radio" name="q3" value="4">
                    <input type="radio" name="q3" value="5">
                    <span>5</span>
                </div>
            </div>

            <!-- Spørgsmål 4 -->
            <div class="question-container">
                <label>4. Hjemmesidens struktur og menuopbygning er logisk.</label>
                <div class="options">
                    <span>1</span>
                    <input type="radio" name="q4" value="1" required>
                    <input type="radio" name="q4" value="2">
                    <input type="radio" name="q4" value="3">
                    <input type="radio" name="q4" value="4">
                    <input type="radio" name="q4" value="5">
                    <span>5</span>
                </div>
            </div>

            <!-- Spørgsmål 5 -->
            <div class="question-container">
                <label>5. Det er nemt at vælge sæder og gennemføre billetkøb.</label>
                <div class="options">
                    <span>1</span>
                    <input type="radio" name="q5" value="1" required>
                    <input type="radio" name="q5" value="2">
                    <input type="radio" name="q5" value="3">
                    <input type="radio" name="q5" value="4">
                    <input type="radio" name="q5" value="5">
                    <span>5</span>
                </div>
            </div>

            <!-- Spørgsmål 6 -->
            <div class="question-container">
                <label>6. Jeg oplever, at hjemmesiden fungerer teknisk stabilt (fx uden fejl eller lange indlæsningstider).</label>
                <div class="options">
                    <span>1</span>
                    <input type="radio" name="q6" value="1" required>
                    <input type="radio" name="q6" value="2">
                    <input type="radio" name="q6" value="3">
                    <input type="radio" name="q6" value="4">
                    <input type="radio" name="q6" value="5">
                    <span>5</span>
                </div>
            </div>

            <!-- Spørgsmål 7 -->
            <div class="question-container">
                <label>7. Designet gør det let at få overblik over aktuelle film og kommende premierefilm.</label>
                <div class="options">
                    <span>1</span>
                    <input type="radio" name="q7" value="1" required>
                    <input type="radio" name="q7" value="2">
                    <input type="radio" name="q7" value="3">
                    <input type="radio" name="q7" value="4">
                    <input type="radio" name="q7" value="5">
                    <span>5</span>
                </div>
            </div>

            <!-- Spørgsmål 8 -->
            <div class="question-container">
                <label>8. Jeg ville foretrække at købe billetter via denne hjemmeside frem for at møde fysisk op i biografen.</label>
                <div class="options">
                    <span>1</span>
                    <input type="radio" name="q8" value="1" required>
                    <input type="radio" name="q8" value="2">
                    <input type="radio" name="q8" value="3">
                    <input type="radio" name="q8" value="4">
                    <input type="radio" name="q8" value="5">
                    <span>5</span>
                </div>
            </div>

            <!-- Spørgsmål 9 -->
            <div class="question-container">
                <label>9. Jeg havde ikke brug for hjælp for at kunne bruge hjemmesiden.</label>
                <div class="options">
                    <span>1</span>
                    <input type="radio" name="q9" value="1" required>
                    <input type="radio" name="q9" value="2">
                    <input type="radio" name="q9" value="3">
                    <input type="radio" name="q9" value="4">
                    <input type="radio" name="q9" value="5">
                    <span>5</span>
                </div>
            </div>

            <!-- Spørgsmål 10 -->
            <div class="question-container">
                <label>10. Samlet set er jeg tilfreds med brugervenligheden på biografhjemmesiden.</label>
                <div class="options">
                    <span>1</span>
                    <input type="radio" name="q10" value="1" required>
                    <input type="radio" name="q10" value="2">
                    <input type="radio" name="q10" value="3">
                    <input type="radio" name="q10" value="4">
                    <input type="radio" name="q10" value="5">
                    <span>5</span>
                </div>
            </div>

            <button type="submit">Beregn SUS Score</button>
        </form>

        <div id="result" class="hidden">
            <h2>Din SUS Score: <span id="scoreValue">0</span></h2>
            <p id="feedbackText"></p>
            <button id="resetBtn">Start forfra</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
